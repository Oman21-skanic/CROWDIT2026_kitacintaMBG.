<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenangin - Profile</title>
    <!-- Removed Tailwind CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./profile.css">
</head>
<body>

    <div class="bg-effects">
        <img src="../../assets/images/logoblureffect.svg" class="bg-blur" alt="Blur Background">
        <img src="../../assets/images/Star.svg" class="bg-star" alt="Star Background">
    </div>

    <nav class="profile-nav">
        <button onclick="window.location.href='../../index.html'" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <span class="nav-title">Profil Saya</span>
        <div class="nav-spacer"></div>
    </nav>

    <main class="profile-main">
        
        <div class="profile-header">
            <div class="avatar-wrapper">
                <img id="profile-avatar" src="https://api.dicebear.com/7.x/notionists/svg?seed=user" alt="Profile Picture" class="profile-avatar">
                
                <button id="btn-edit-avatar" class="btn-edit-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </button>
                <input type="file" id="input-file-avatar" class="hidden-input" accept="image/*">
            </div>
            
            <div class="profile-info">
                <h1 id="profile-heading-name" class="profile-name">Memuat...</h1>
                <p class="profile-role">Pelajar / Mahasiswa</p>
            </div>
        </div>

        <div class="section-wrapper">
            <h2 class="section-title">Identitas</h2>
            
            <form id="profile-form" class="profile-form" onsubmit="event.preventDefault();">

                <div class="form-group">
                    <label class="form-label">Nama</label>
                    <div class="input-container figma-shadow">
                        <div class="input-icon-left">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4 -4 1.79-4 4 1.79 4 4 4z"></path>
                                <path d="M4 20c0-2.21 3.58-4 8-4s8 1.79 8 4"></path>
                            </svg>
                        </div>
                        <input
                            type="text"
                            id="input-nama"
                            placeholder="isi dengan nama lengkap kamu..."
                            class="custom-input with-left-icon"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-container figma-shadow">
                        <div class="input-icon-right" style="color: #5E938B;">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                        </div>
                        <input
                            type="email"
                            id="input-email"
                            disabled
                            placeholder="email akun kamu"
                            class="custom-input with-left-icon"
                            style="padding-left: 14px; padding-right: 40px;"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Tanggal Lahir</label>
                    <div class="input-container figma-shadow">
                        <div class="input-icon-left">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </div>
                        <input
                            type="date"
                            id="input-tanggal-lahir"
                            class="custom-input custom-date-picker with-left-icon"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Nomor Telepon</label>
                    <div class="input-container figma-shadow">
                        <div class="input-icon-left">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                            </svg>
                        </div>
                        <input
                            type="tel"
                            id="input-telepon"
                            placeholder="Contohnya: 0819481035"
                            class="custom-input with-left-icon"
                        >
                    </div>
                </div>

            </form>
        </div>

        <div class="section-wrapper">
            <h2 class="section-title">Aksi</h2>
            
            <button id="btn-logout" class="btn-action btn-logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Keluar
            </button>

            <button id="btn-delete-account" class="btn-action btn-delete">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
                Hapus Akun
            </button>
        </div>

    </main>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        
        <div class="modal-content" id="custom-modal-box">
            
            <button id="modal-close" class="modal-close-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            
            <div id="modal-icon" class="modal-icon-container" style="display: none;"></div>
            
            <h3 id="modal-title" class="modal-title">Title</h3>
            <p id="modal-message" class="modal-message">Message goes here.</p>
            
            <div id="modal-buttons" class="modal-buttons">
            </div>
            
        </div>
    </div>

    <!-- Logout Confirmation Modal -->
    <div id="logout-modal" class="modal-overlay-2">
        <div class="modal-backdrop-2"></div>
        <div class="modal-content-2">
            <button id="logout-modal-close" class="modal-close-btn-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#727c7a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-icon-2">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="#0C3932" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <polyline points="16 17 21 12 16 7" stroke="#0C3932" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="21" y1="12" x2="9" y2="12" stroke="#0C3932" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h3 class="modal-title-2">Konfirmasi Keluar</h3>
            <p class="modal-message-2">Apakah kamu yakin ingin keluar dari akun ini?</p>
            <div class="modal-buttons-2">
                <button id="btn-confirm-logout" class="modal-btn-primary-2">Keluar</button>
                <button id="btn-cancel-logout" class="modal-btn-cancel-2">Batal</button>
            </div>
        </div>
    </div>

    <!-- Delete Account Confirmation Modal (Figma) -->
    <div id="delete-modal" class="delete-modal-overlay">
        <div class="delete-modal-backdrop"></div>
        <div class="delete-modal-content">
            <button id="delete-modal-close" class="delete-modal-close-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#727c7a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="delete-modal-icon">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 22h20L12 2z" fill="#ff0000"/>
                    <line x1="12" y1="9" x2="12" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="12" cy="18" r="1.2" fill="white"/>
                </svg>
            </div>
            <h3 class="delete-modal-title">Konfirmasi Hapus</h3>
            <p class="delete-modal-message">Dengan ini kamu menghapus akunmu secara <span class="delete-modal-highlight">permanen</span> dan tidak ada jalan kembali</p>
            <div class="delete-modal-buttons">
                <button id="btn-confirm-delete" class="delete-btn-danger">Hapus</button>
                <button id="btn-cancel-delete" class="delete-btn-cancel">Batal</button>
            </div>
        </div>
    </div>

    <script src="./profile.js"></script>
</body>
</html>
