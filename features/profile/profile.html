<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenangin - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./profile.css">
</head>
<body class="min-h-screen bg-[#F8FAFC] text-[#112720] relative overflow-x-hidden font-jakarta">

    <div class="fixed inset-0 z-0 pointer-events-none flex items-center justify-center overflow-hidden">
        <img src="../../assets/images/logoblureffect.svg" class="absolute max-w-none w-[180%] translate-y-[260px] md:w-[100%] md:translate-y-[330px] opacity-60" alt="Blur Background">
        <img src="../../assets/images/Star.svg" class="absolute max-w-none w-[150%] translate-y-[260px] md:w-[70%] opacity-75 md:translate-y-[150px]" alt="Star Background">
    </div>

    <nav class="relative z-10 w-full px-5 py-5 flex justify-between items-center max-w-[650px] mx-auto">
        <button onclick="window.location.href='../../index.html'" class="flex items-center justify-center w-10 h-10 bg-white rounded-full shadow-sm text-[#0C3932] hover:bg-gray-50 transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <span class="font-bold text-[16px] text-[#0C3932]">Profil Saya</span>
        <div class="w-10"></div>
    </nav>

    <main class="relative z-10 flex flex-col items-center px-5 pt-3 pb-14 w-full max-w-[650px] mx-auto">
        
        <div class="flex items-center gap-4 w-full mb-8">
            <div class="relative flex-shrink-0">
                <img id="profile-avatar" src="https://api.dicebear.com/7.x/notionists/svg?seed=user" alt="Profile Picture" class="w-[75px] h-[75px] rounded-full object-cover bg-gray-200 border-2 border-[#44726B] shadow-sm">
                
                <button id="btn-edit-avatar" class="absolute bottom-0 right-0 bg-[#0D4F45] text-white p-1.5 rounded-full border-2 border-white hover:scale-105 transition-transform cursor-pointer shadow-sm">
                    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </button>
                <input type="file" id="input-file-avatar" class="hidden" accept="image/*">
            </div>
            
            <div class="flex flex-col">
                <h1 id="profile-heading-name" class="text-[22px] md:text-[24px] font-semibold text-[#0C3932] tracking-tight leading-tight">Memuat...</h1>
                <p class="text-[13px] text-[#5E938B] font-regular mt-0.5">Pelajar / Mahasiswa</p>
            </div>
        </div>

        <div class="w-full mb-7">
            <h2 class="text-[12px] font-semibold text-[#0C3932] border-b border-gray-250/80 pb-2.5 mb-4 w-full">Identitas</h2>
            
            <form id="profile-form" class="grid grid-cols-1 md:grid-cols-2 gap-x-5 gap-y-4" onsubmit="event.preventDefault();">

                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-semibold text-gray-600">Nama</label>
                    <div class="relative flex items-center bg-white border border-[#E5ECEB] rounded-xl figma-shadow transition-all duration-200 focus-within:border-[#5E938B] focus-within:text-[#5E938B] text-[#5E938B]">
                        <div class="absolute left-3.5 transition-colors duration-200">
                            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4 -4 1.79-4 4 1.79 4 4 4z"></path>
                                <path d="M4 20c0-2.21 3.58-4 8-4s8 1.79 8 4"></path>
                            </svg>
                        </div>
                        <input
                            type="text"
                            id="input-nama"
                            placeholder="isi dengan nama lengkap kamu..."
                            class="w-full bg-transparent border-none rounded-xl py-2.5 pl-[2.5rem] pr-3.5 text-[12px] font-medium text-gray-800 
                                   placeholder-[#5E938B]/75
                                   focus:outline-none focus:ring-0 
                                   transition-colors duration-200 
                                   focus:text-[#112720]
                                   focus:placeholder-[#5E938B] custom-input"
                        >
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-semibold text-gray-600">Email</label>
                    <div class="relative flex items-center bg-white border border-[#E5ECEB] rounded-xl figma-shadow transition-all duration-200 text-[#5E938B]">
                        <div class="absolute right-3.5 transition-colors duration-200 pointer-events-none">
                            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                        </div>
                        <input
                            type="email"
                            id="input-email"
                            disabled
                            placeholder="email akun kamu"
                            class="w-full bg-transparent border-none rounded-xl py-2.5 pl-3.5 pr-[2.5rem] text-[12px] font-medium text-gray-500 
                                cursor-not-allowed 
                                placeholder-[#5E938B]/75
                                focus:outline-none focus:ring-0 custom-input"
                        >
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-semibold text-gray-600">Tanggal Lahir</label>
                    <div class="relative flex items-center bg-white border border-[#E5ECEB] rounded-xl figma-shadow transition-all duration-200 focus-within:border-[#5E938B] text-[#5E938B]">
                        <div class="absolute left-3.5 pointer-events-none">
                            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </div>
                        <input
                            type="date"
                            id="input-tanggal-lahir"
                            class="w-full bg-transparent border-none rounded-xl py-2.5 pl-[2.7rem] pr-3.5 text-[12px] font-medium text-gray-800 
                                   custom-date-picker text-gray-400
                                   focus:outline-none focus:ring-0 
                                   transition-colors duration-200 
                                   focus:text-[#112720]"
                        >
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-semibold text-gray-600">Nomor Telepon</label>
                    <div class="relative flex items-center bg-white border border-[#E5ECEB] rounded-xl figma-shadow transition-all duration-200 focus-within:border-[#5E938B] text-[#5E938B]">
                        <div class="absolute left-3.5 transition-colors duration-200">
                            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                            </svg>
                        </div>
                        <input
                            type="tel"
                            id="input-telepon"
                            placeholder="Contohnya: 0819481035"
                            class="w-full bg-transparent border-none rounded-xl py-2.5 pl-[2.7rem] pr-3.5 text-[12px] font-medium text-gray-800 
                                   placeholder-[#5E938B]/75
                                   focus:outline-none focus:ring-0 
                                   transition-colors duration-200 
                                   focus:text-[#112720]
                                   focus:placeholder-[#5E938B] custom-input"
                        >
                    </div>
                </div>

            </form>
        </div>

        <div class="w-full">
            <h2 class="text-[12px] font-semibold text-[#0C3932] border-b border-gray-250 pb-2.5 mb-4 w-full">Aksi</h2>
            
            <button id="btn-logout" class="w-full flex items-center justify-center gap-1.5 bg-white/90 border border-gray-300 rounded-xl py-3 text-[12px] font-medium text-gray-700 shadow-sm hover:bg-gray-50 transition-colors focus:outline-none mb-3">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Keluar
            </button>

            <button id="btn-delete-account" class="w-full flex items-center justify-center gap-1.5 bg-white/90 border border-red-500 rounded-xl py-3 text-[12px] font-medium text-red-500 shadow-sm hover:bg-red-50 transition-colors focus:outline-none">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
                Hapus Akun
            </button>
        </div>

    </main>

    <div id="custom-modal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="modal-backdrop"></div>
        
        <div class="relative bg-white w-[380px] max-w-[90%] rounded-[20px] flex flex-col items-center p-6 text-center shadow-2xl transform scale-95 transition-transform duration-300" id="custom-modal-box">
            
            <button id="modal-close" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-colors focus:outline-none">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            
            <div id="modal-icon" class="mb-3" style="display: none;"></div>
            
            <h3 id="modal-title" class="font-bold text-[20px] text-[#0C3932] tracking-tight mb-2">Title</h3>
            <p id="modal-message" class="text-[13px] text-gray-500 leading-snug mb-6 px-1">Message goes here.</p>
            
            <div id="modal-buttons" class="flex gap-3 w-full justify-center">
            </div>
            
        </div>
    </div>

    <script src="./profile.js"></script>
</body>
</html>
